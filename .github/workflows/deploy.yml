name: Stamp SW cache version

on:
  push:
    branches: [main]

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject build timestamp into service worker
        run: |
          BUILDTIME=$(date +%s)
          sed -i "s/__BUILDTIME__/$BUILDTIME/" sw.js

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --cached --quiet || git commit -m "chore: stamp SW cache version [skip ci]"
          git push
